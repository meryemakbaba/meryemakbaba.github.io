<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Meryem Akbaba</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="wrapper" style="height: auto; min-height: 100vh;">
        <nav class="navbar">
            <div class="brand">
                <h1>MERYEM<span>AKBABA</span></h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">ANA SAYFA</a></li>
                <li><a href="about.html">HAKKIMDA</a></li>
                <li><a href="interests.html">İLGİ ALANLARIM</a></li>
                <li><a href="contact.html" class="active">İLETİŞİM</a></li>
            </ul>
        </nav>

        <main class="container" style="padding: 40px 5%;">
            <div class="contact-container" style="background: var(--card-bg); border: 1px solid var(--border-color); padding: 40px; border-radius: 15px; max-width: 800px; margin: 0 auto;">
                <h2 style="color: var(--meryem-yellow); text-align: center; margin-bottom: 30px; text-transform: uppercase;">Detaylı İletişim Formu</h2>
                
                <form>
                    <div style="margin-bottom: 20px;">
                        <label for="name" style="color: var(--text-white); display: block; margin-bottom: 8px; font-weight: bold;">Ad Soyad:</label>
                        <input type="text" id="name" placeholder="Örn: Asaf Karataş" required 
                               style="background: var(--bg-dark); color: white; border: 1px solid var(--border-color); padding: 12px; width: 100%;">
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label for="email" style="color: var(--text-white); display: block; margin-bottom: 8px; font-weight: bold;">E-posta Adresi:</label>
                        <input type="email" id="email" placeholder="ornek@mail.com" required
                               style="background: var(--bg-dark); color: white; border: 1px solid var(--border-color); padding: 12px; width: 100%;">
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label for="password" style="color: var(--text-white); display: block; margin-bottom: 8px; font-weight: bold;">Başvuru Takip Şifresi:</label>
                        <input type="password" id="password" placeholder="Şifrenizi girin"
                               style="background: var(--bg-dark); color: white; border: 1px solid var(--border-color); padding: 12px; width: 100%;">
                    </div>

                    <div class="form-group-gray" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 4px solid var(--accent-neon);">
                        <span class="group-title" style="color: var(--accent-neon); font-weight: bold; display: block; margin-bottom: 15px;">İletişim Tercihi:</span>
                        <div style="display: flex; flex-direction: column; gap: 10px; color: var(--text-white);">
                            <label><input type="radio" name="pref" value="email" checked> Bana e-posta ile ulaşın</label>
                            <label><input type="radio" name="pref" value="phone"> Bana telefonla ulaşın</label>
                        </div>
                    </div>

                    <div class="form-group-gray" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 4px solid var(--accent-neon);">
                        <span class="group-title" style="color: var(--accent-neon); font-weight: bold; display: block; margin-bottom: 15px;">İlgi Alanları / Yetenekler:</span>
                        <div style="display: flex; flex-direction: column; gap: 10px; color: var(--text-white);">
                            <label><input type="checkbox" value="html"> HTML</label>
                            <label><input type="checkbox" value="css"> CSS</label>
                            <label><input type="checkbox" value="algo"> Algoritma</label>
                        </div>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label for="subject" style="color: var(--text-white); display: block; margin-bottom: 8px; font-weight: bold;">Konu:</label>
                        <select id="subject" style="background: var(--bg-dark); color: white; border: 1px solid var(--border-color); padding: 12px; width: 100%;">
                            <option value="">Lütfen bir konu seçin...</option>
                            <option value="is">İş Teklifi</option>
                            <option value="soru">Soru</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label for="file" style="color: var(--text-white); display: block; margin-bottom: 8px; font-weight: bold;">Özgeçmiş (CV) veya Fotoğraf Yükle:</label>
                        <input type="file" id="file" style="color: var(--text-gray); width: 100%;">
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label for="message" style="color: var(--text-white); display: block; margin-bottom: 8px; font-weight: bold;">Mesajınız:</label>
                        <textarea id="message" rows="4" placeholder="Detaylı mesajınızı buraya yazabilirsiniz..." 
                                  style="background: var(--bg-dark); color: white; border: 1px solid var(--border-color); padding: 12px; width: 100%; resize: none;"></textarea>
                    </div>

                    <div class="button-group" style="display: flex; gap: 15px;">
                        <button type="submit" class="btn-neon" style="flex: 2;">GÖNDER</button>
                        <button type="reset" class="btn-neon" style="flex: 1; border-color: var(--text-gray); color: var(--text-gray);">TEMİZLE</button>
                    </div>
                </form>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Meryem Akbaba | Marmara Üniversitesi Web Programlama</p>
        </footer>
    </div>

</body>
</html>
