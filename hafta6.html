<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meryem Akbaba | Hafta 6 Uygulamaları</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="wrapper">
        <nav class="navbar">
            <div class="brand">
                <h1>MERYEM<span>AKBABA</span></h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">← ANA SAYFAYA DÖN</a></li>
            </ul>
        </nav>

        <main class="lab-main">
            <h2 class="section-title">JAVASCRIPT LABORATUVAR UYGULAMALARI</h2>
            
            <div class="lab-container">
                <div class="contact-container lab-card">
                    <h3>Öğrenci Not Hesaplama</h3>
                    <div class="input-group">
                        <label for="studentName">AD SOYAD</label>
                        <input type="text" id="studentName" placeholder="Ad Soyad giriniz">
                    </div>
                    <div class="input-group">
                        <label for="vizeNote">VİZE NOTU (%40)</label>
                        <input type="number" id="vizeNote" placeholder="0-100 arası">
                    </div>
                    <div class="input-group">
                        <label for="finalNote">FİNAL NOTU (%60)</label>
                        <input type="number" id="finalNote" placeholder="0-100 arası">
                    </div>
                    <button class="btn-neon" onclick="hesaplaNot()">HESAPLA</button>
                    
                    <div id="notSonuc" class="form-group-gray"></div>
                </div>

                <div class="contact-container lab-card">
                    <h3>Birim Dönüştürücü</h3>
                    <div class="input-group">
                        <label for="unitValue">DEĞER GİRİNİZ</label>
                        <input type="number" id="unitValue" placeholder="Sayısal değer giriniz">
                    </div>
                    <div class="input-group">
                        <label for="convertType">DÖNÜŞÜM TÜRÜ</label>
                        <select id="convertType">
                            <option value="c-f">Celsius -> Fahrenheit</option>
                            <option value="m-km">Metre -> Kilometre</option>
                            <option value="kg-g">Kilogram -> Gram</option>
                        </select>
                    </div>
                    <button class="btn-neon" onclick="donustur()">DÖNÜŞTÜR</button>
                    
                    <div id="birimSonuc" class="form-group-gray"></div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Meryem Akbaba | Marmara Üniversitesi Web Programlama Dersi</p>
        </footer>
    </div>

    <script src="scripts/hafta6.js"></script>
</body>
</html>
